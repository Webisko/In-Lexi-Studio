services:
  cms:
    build: .
    container_name: inlexi-cms
    restart: unless-stopped
    ports:
      - '${CMS_PORT:-1337}:80'
    volumes:
      - ./backend_data/inlexistudio.db:/app/inlexistudio.db
      - ./public/uploads:/app/public/uploads
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${DATABASE_URL:-file:./inlexistudio.db}
      NODE_ENV: production
      PORT: 80

  umami-db:
    image: postgres:15-alpine
    container_name: umami-db
    restart: always
    environment:
      POSTGRES_DB: ${UMAMI_POSTGRES_DB:-umami}
      POSTGRES_USER: ${UMAMI_POSTGRES_USER:-umami}
      POSTGRES_PASSWORD: ${UMAMI_POSTGRES_PASSWORD}
    volumes:
      - ./backend_data/umami-db:/var/lib/postgresql/data

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    restart: always
    ports:
      - '${UMAMI_PORT:-3000}:3000'
    environment:
      DATABASE_URL: postgresql://${UMAMI_POSTGRES_USER:-umami}:${UMAMI_POSTGRES_PASSWORD}@umami-db:5432/${UMAMI_POSTGRES_DB:-umami}
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      - umami-db
