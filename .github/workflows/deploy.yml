name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        env:
          PUBLIC_API_URL: 'https://inlexistudio.com/app/api'
          PUBLIC_BASE_URL: 'https://inlexistudio.com/app'
        run: npm run build

      - name: Install SSH Key
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Adding Known Hosts
        shell: bash
        run: |
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy Frontend (public_html)
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=yes" --delete ./dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:domains/inlexistudio.com/public_html/

      - name: Deploy Backend (cms-app)
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=yes" \
          --exclude 'node_modules' \
          --exclude '.env' \
          --exclude 'dist' \
          --exclude '.git' \
          ./api ./prisma ./admin ./app.js ./package.json ./package-lock.json \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:domains/inlexistudio.com/cms-app/

      - name: Deploy CMS Admin (admin.inlexistudio.com)
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=yes" --delete \
          ./admin/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:domains/admin.inlexistudio.com/public_html/

      - name: Normalize Public Permissions
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=yes ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            find domains/inlexistudio.com/public_html -type d -exec chmod 755 {} \; &&
            find domains/inlexistudio.com/public_html -type f -exec chmod 644 {} \; &&
            find domains/admin.inlexistudio.com/public_html -type d -exec chmod 755 {} \; &&
            find domains/admin.inlexistudio.com/public_html -type f -exec chmod 644 {} \;
          "

      - name: Configure Passenger & Restart
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=yes ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd domains/inlexistudio.com/cms-app &&
            
            # Create/Overwrite Passenger .htaccess
            echo 'PassengerEnabled on' > .htaccess &&
            echo 'PassengerAppRoot /home/${{ secrets.SSH_USER }}/domains/inlexistudio.com/cms-app' >> .htaccess &&
            echo 'PassengerAppType node' >> .htaccess &&
            echo 'PassengerStartupFile app.js' >> .htaccess &&
            echo 'PassengerNodejs /home/${{ secrets.SSH_USER }}/nodevenv/domains/inlexistudio.com/cms-app/22/bin/node' >> .htaccess &&

            # Install & Restart
            source /home/${{ secrets.SSH_USER }}/nodevenv/domains/inlexistudio.com/cms-app/22/bin/activate &&
            npm install --production &&
            npx prisma generate &&
            find . -type d -exec chmod 755 {} \; &&
            find . -type f -exec chmod 644 {} \; &&
            touch app.js
          "
